x-web-base: &web-base
    build: .
    environment:
        - MYSQL_DATABASE=bluecalendar
        - MYSQL_USER=bluecalendar
        - MYSQL_PASSWORD=bluecalendar
        - SMTP_PORT=1025
        - FROM_NAME=Bluecube
        - SUBJECT_PREFIX=[BlueCalendar]
    develop:
        watch:
            - action: sync
              path: .
              target: /var/www/html
              ignore:
                  - vendor/
                  - .git/
                  - node_modules/

x-mysql-base: &mysql-base
    image: mysql:8
    environment:
        - MYSQL_ROOT_PASSWORD=bluecalendar
        - MYSQL_DATABASE=bluecalendar
        - MYSQL_USER=bluecalendar
        - MYSQL_PASSWORD=bluecalendar
    volumes:
        - ./sql/init_bluecalendar.sql:/docker-entrypoint-initdb.d/init_bluecalendar.sql

x-mailhog-base: &mailhog-base
    image: mailhog/mailhog

services:
    web_local:
        <<: *web-base
        profiles: [local]
        ports:
            - "127.0.0.1:${WEB_PORT:-80}:80"
        environment:
            - MYSQL_HOST=mysql_local
            - MYSQL_DATABASE=bluecalendar
            - MYSQL_USER=bluecalendar
            - MYSQL_PASSWORD=bluecalendar
            - SMTP_HOST=mailhog_local
            - SMTP_PORT=1025
            - FROM_NAME=Bluecube
            - SUBJECT_PREFIX=[BlueCalendar]

    mysql_local:
        <<: *mysql-base
        profiles: [local]
        ports:
            - "127.0.0.1:${MYSQL_PORT:-3306}:3306"

    mailhog_local:
        <<: *mailhog-base
        profiles: [local]
        ports:
            - "127.0.0.1:${MAILHOG_SMTP_PORT:-1025}:1025"
            - "127.0.0.1:${MAILHOG_UI_PORT:-8025}:8025"

    web_online:
        <<: *web-base
        profiles: [online]
        ports:
            - "0.0.0.0:${WEB_PORT:-80}:80"
        environment:
            - MYSQL_HOST=mysql_online
            - MYSQL_DATABASE=bluecalendar
            - MYSQL_USER=bluecalendar
            - MYSQL_PASSWORD=bluecalendar
            - SMTP_HOST=mailhog_online
            - SMTP_PORT=1025
            - FROM_NAME=Bluecube
            - SUBJECT_PREFIX=[BlueCalendar]

    mysql_online:
        <<: *mysql-base
        profiles: [online]
        ports:
            - "0.0.0.0:${MYSQL_PORT:-3306}:3306"

    mailhog_online:
        <<: *mailhog-base
        profiles: [online]
        ports:
            - "0.0.0.0:${MAILHOG_SMTP_PORT:-1025}:1025"
            - "0.0.0.0:${MAILHOG_UI_PORT:-8025}:8025"
